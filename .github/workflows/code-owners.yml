name: Code Owners Check

on:
  pull_request:
    types: [opened, synchronize, reopened]
  pull_request_review:
    types: [submitted, dismissed]

jobs:
  validate-owners:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Better Code Owners
        uses: darryljohnson/better-codeowners@main
